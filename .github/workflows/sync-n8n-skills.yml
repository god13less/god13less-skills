name: Sync n8n skills

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Clone source repo (sparse)
        run: |
          rm -rf /tmp/n8n-source
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/czlonkowski/n8n-skills.git \
            /tmp/n8n-source
          cd /tmp/n8n-source
          git sparse-checkout set skills

      - name: Sync skills directory
        run: |
          SRC=/tmp/n8n-source/skills
          for d in skills/n8n-*/; do rm -rf "$d"; done
          for d in "$SRC"/n8n-*/; do
            cp -r "$d" skills/
          done
          rm -rf /tmp/n8n-source

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes, skipping commit."
            exit 0
          fi

          git add skills/n8n-*
          git commit -m "sync: update n8n skills from upstream"
          git push
