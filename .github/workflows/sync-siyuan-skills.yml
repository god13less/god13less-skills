name: Sync siyuan-sisyphus skills

on:
  schedule:
    # 每天 UTC 0:00 / 北京时间 8:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Clone source repo (sparse)
        run: |
          rm -rf /tmp/siyuan-source
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/yangtaihong59/siyuan-plugins-mcp-sisyphus.git \
            /tmp/siyuan-source
          cd /tmp/siyuan-source
          git sparse-checkout set skills/siyuan-sisyphus

      - name: Sync skills directory
        run: |
          SRC=/tmp/siyuan-source/skills/siyuan-sisyphus
          # Remove old siyuan skills (skip llm-wiki managed by separate workflow)
          for d in skills/siyuan-*/; do
            [[ "$d" == "skills/siyuan-sisyphus-llm-wiki/" ]] && continue
            rm -rf "$d"
          done
          # Copy each sub-skill to flat skills/
          for d in "$SRC"/*/; do
            cp -r "$d" skills/
          done
          rm -rf /tmp/siyuan-source

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes, skipping commit."
            exit 0
          fi

          git add -A skills/siyuan-*
          git commit -m "sync: update siyuan-sisyphus skills from upstream"
          git push
