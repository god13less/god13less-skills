name: Sync siyuan-sisyphus skills

on:
  schedule:
    # 每天 UTC 0:00 / 北京时间 8:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Clone source repo (sparse)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/yangtaihong59/siyuan-plugins-mcp-sisyphus.git \
            /tmp/siyuan-source
          cd /tmp/siyuan-source
          git sparse-checkout set skills/siyuan-sisyphus

      - name: Sync skills directory
        run: |
          rm -rf skills/siyuan-sisyphus
          cp -r /tmp/siyuan-source/skills/siyuan-sisyphus skills/siyuan-sisyphus
          rm -rf /tmp/siyuan-source

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes, skipping commit."
            exit 0
          fi

          git add skills/siyuan-sisyphus
          git commit -m "sync: update siyuan-sisyphus skills from upstream"
          git push
